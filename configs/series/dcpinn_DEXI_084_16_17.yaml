# --- Model Architecture ---
neuron_num: 150
c_neuron_num: 256
hid_layer_num: 5

# --- Feature Engineering ---
positional_encoding:
  use: false
  freq_nums: [20, 20, 20, 0]
  freq_scale: 1.0

cuda_visible_devices: [0]

# --- Physics & PDE Configuration ---
use_DTI: false
use_learnable_D: false
viscosity: 6.95e-4

# --- Logging ---
logging:
  backend: mlflow
  tracking_uri: "http://172.100.100.100:5000"
  experiment: "mr-aiv"

# --- RBAR (Residual-Based Attention Resampling) ---
enable_rbar: true

# --- Dataloader & Checkpointing Settings ---
reload_dataloaders_every_n_epochs: 100
ckpt_save_val_interval: 200
dataset_num_workers: 0
enable_validation: true

# --- Training Phases ---
phases:
  ad_pde_p_k:
    incompressible: true
    learning_rate: 0.00005
    max_epochs: 500
    batch_size: 85000

  joint_ad_pde+joint_data:
    incompressible: true
    learning_rate: 1.0e-5
    max_epochs: 2000
    batch_size: 70000
