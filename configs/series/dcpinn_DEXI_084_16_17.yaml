# Auto-generated DCPINN two-frame config for DEXI_084.
# Resume from the migrated ad_pde_p_k checkpoint and continue into joint training.

do_training: true
continue_training: true
ckpt_path: "/public/home/bairuilianggroup/winfred/workspace/MRI_PINO/result/mlruns/589377894070960450/333ab6db0df04683bf45b176ad4b77d6/artifacts/checkpoints/ad_pde_p_k/phase_snapshot/dcpinn_ad_pde_p_k.pth"

# PT sample input for the selected two-frame pair
dcemrinp_data_path: "data/dce_mri/DEXI_083/1.0_16_17_samples.pt"
